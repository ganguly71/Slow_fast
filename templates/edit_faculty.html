{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body p-4">
                <h5 class="card-title mb-4">Edit Faculty Details</h5>
                <form method="POST" action="{{ url_for('main.edit_faculty', user_id=user.id) }}">
                    <div class="mb-3">
                        <label for="name" class="form-label">Name</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ user.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">New Password (leave blank to keep current)</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Enter new password if changing">
                    </div>
                    <div class="mb-3">
                        <label for="role" class="form-label">Role</label>
                        <select class="form-select" id="role" name="role" required {% if user.id == current_user.id %}disabled{% endif %}>
                            <option value="faculty" {% if user.role == 'faculty' %}selected{% endif %}>Faculty</option>
                            <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
                        </select>
                        {% if user.id == current_user.id %}
                        <div class="form-text text-muted">You cannot change your own role.</div>
                        <input type="hidden" name="role" value="{{ user.role }}">
                        {% endif %}
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Assigned Subjects</label>
                        <div class="row">
                            {% for subj in subjects %}
                            <div class="col-6">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="subjects" value="{{ subj }}" id="subj_{{ subj }}"
                                           {% if subj in user.get_subjects() %}checked{% endif %}>
                                    <label class="form-check-label" for="subj_{{ subj }}">{{ subj }}</label>
                                </div>
                            </div>
                            {% endfor %}
                        </div>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('main.manage_faculty') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
