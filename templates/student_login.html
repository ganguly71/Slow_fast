{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="card border-0 shadow-lg" style="border-radius: 16px;">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="rounded-circle bg-primary-subtle p-3 d-inline-flex mb-3" style="color: #0d6efd;">
                        <i class="bi bi-mortarboard fs-2"></i>
                    </div>
                    <h3 class="fw-bold text-dark">Student Login</h3>
                    <p class="text-muted">Enter credentials to access your portal</p>
                </div>
                
                <form method="POST" action="{{ url_for('main.student_login') }}">
                    <div class="mb-3">
                        <label for="roll_no" class="form-label fw-semibold">Roll Number</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-card-text text-muted"></i></span>
                            <input type="text" class="form-control bg-light border-start-0 ps-0" id="roll_no" name="roll_no" required placeholder="e.g. 21CS01">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="name" class="form-label fw-semibold">Full Name <span class="text-primary fs-7">(Required for 1st login)</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                            <input type="text" class="form-control bg-light border-start-0 ps-0" id="name" name="name" placeholder="Enter full name accurately">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                            <input type="password" class="form-control bg-light border-start-0 ps-0" id="password" name="password" required placeholder="••••••••">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 py-2.5 fw-bold" style="border-radius: 10px;">
                        Login / Register
                    </button>
                </form>

                <div class="alert alert-info mt-4 mb-0 p-3 border-0 d-flex align-items-start" style="border-radius: 10px; font-size: 0.85rem;">
                    <i class="bi bi-info-circle-fill me-2 fs-5 text-primary"></i>
                    <div>
                        <strong>First-time logging in?</strong> Enter your Roll No, accurate registered Name, and create a Password. Once recorded, this password will be used for all future logins.
                    </div>
                </div>

                <div class="text-center mt-4">
                    <a href="{{ url_for('main.index') }}" class="text-decoration-none text-muted small"><i class="bi bi-arrow-left me-1"></i> Back to portal selector</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
